<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lemonPPT - AI 生成演示文稿</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #f8fafc;
    }
    .container {
      width: 100%;
      max-width: 520px;
      padding: 40px 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #facc15 0%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 15px;
    }
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
    }
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.6);
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.15);
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #facc15 0%, #fb923c 100%);
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    button:hover { opacity: 0.92; }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15, 23, 42, 0.3);
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      font-size: 13px;
      display: none;
    }
    .error.show { display: block; }
    .api-key-toggle {
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      margin-top: 4px;
      display: inline-block;
    }
    .api-key-toggle:hover { color: #facc15; }
    #apiKeyWrap { display: none; }
    #apiKeyWrap.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <h1>lemonPPT</h1>
      <p>输入一句话，AI 生成完整演示文稿</p>
    </div>
    <div class="card">
      <form id="createForm">
        <div class="field">
          <label for="input">主题 / 需求</label>
          <textarea id="input" placeholder="例如：介绍一款面向自由职业者的 AI 写作助手，强调节省时间、提升质量..." required></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label for="pageCount">页数</label>
            <input type="number" id="pageCount" value="8" min="3" max="30" required />
          </div>
          <div class="field">
            <label for="theme">主题风格</label>
            <select id="theme">
              <option value="minimal">Minimal</option>
              <option value="dark-tech">Dark Tech</option>
              <option value="warm-business">Warm Business</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="language">语言</label>
          <select id="language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="field">
          <span class="api-key-toggle" id="apiKeyToggle">+ 使用自己的 OpenAI API Key（可选）</span>
          <div id="apiKeyWrap">
            <label for="apiKey">OpenAI API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." />
            <p class="hint">留空则使用服务端配置，无 Key 时会返回示例内容。</p>
          </div>
        </div>
        <button type="submit" id="submitBtn">开始生成</button>
        <div class="error" id="errorBox"></div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('createForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const apiKeyToggle = document.getElementById('apiKeyToggle');
    const apiKeyWrap = document.getElementById('apiKeyWrap');
    const apiKeyInput = document.getElementById('apiKey');

    const savedKey = localStorage.getItem('lemonppt_api_key');
    if (savedKey) {
      apiKeyInput.value = savedKey;
      apiKeyWrap.classList.add('show');
      apiKeyToggle.textContent = '- 收起 API Key';
    }

    apiKeyToggle.addEventListener('click', () => {
      apiKeyWrap.classList.toggle('show');
      apiKeyToggle.textContent = apiKeyWrap.classList.contains('show') ? '- 收起 API Key' : '+ 使用自己的 OpenAI API Key（可选）';
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('show');
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading ? '<span class="spinner"></span>生成中...' : '开始生成';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      setLoading(true);

      const apiKey = apiKeyInput.value.trim();
      if (apiKey) localStorage.setItem('lemonppt_api_key', apiKey);
      else localStorage.removeItem('lemonppt_api_key');

      const payload = {
        input: document.getElementById('input').value.trim(),
        pageCount: Number(document.getElementById('pageCount').value),
        theme: document.getElementById('theme').value,
        language: document.getElementById('language').value,
        apiKey: apiKey || undefined,
      };

      try {
        const genRes = await fetch('/api/generate-goal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const genData = await genRes.json();
        if (!genRes.ok || !genData.success) {
          throw new Error(genData.error || '生成失败');
        }

        const renderRes = await fetch('/api/render-editor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(genData.goal),
        });
        const renderData = await renderRes.json();
        if (!renderRes.ok || !renderData.success) {
          throw new Error(renderData.error || '渲染失败');
        }

        window.location.href = '/deck/editor.html';
      } catch (err) {
        showError(err.message || '请求出错，请稍后重试');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
